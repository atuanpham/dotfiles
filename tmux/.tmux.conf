# ==============================================================================
# tmux configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# General Settings
# ------------------------------------------------------------------------------

# Keep prefix as Ctrl+b (default)
set -g prefix C-b

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Increase scrollback buffer size to 50000 lines
set -g history-limit 50000

# Enable 256-color and true-color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse support (allows scrolling through pane output with mouse wheel)
set -g mouse on

# ------------------------------------------------------------------------------
# Key Bindings
# ------------------------------------------------------------------------------

# Sensible pane splitting (easier to remember than % and ")
# | for vertical split, - for horizontal split
# We also open new panes in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation with Ctrl+h/j/k/l (matches nvim window navigation)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ------------------------------------------------------------------------------
# Vi-mode & Copy/Paste
# ------------------------------------------------------------------------------

# Use vi keys in copy mode
setw -g mode-keys vi

# Vi-mode for copy/paste
# v starts selection, y yanks to system clipboard (handled by tmux-yank plugin)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ------------------------------------------------------------------------------
# Status Bar (Tokyonight-inspired)
# ------------------------------------------------------------------------------

# Tokyonight colors:
# bg: #1a1b26, fg: #c0caf5
# blue: #7aa2f7, cyan: #7dcfff, magenta: #bb9af7

set -g status-style bg="#1a1b26",fg="#c0caf5"
set -g status-left-length 50
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26,nobold,nounderscore,noitalics]"

set -g window-status-format "#[fg=#1a1b26,bg=#1a1b26,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1a1b26,bg=#1a1b26,nobold,nounderscore,noitalics]"
set -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,nobold,nounderscore,noitalics]#[fg=#1a1b26,bg=#bb9af7,bold] #I  #W #F #[fg=#bb9af7,bg=#1a1b26,nobold,nounderscore,noitalics]"

set -g status-right "#[fg=#1a1b26,bg=#1a1b26,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#1a1b26] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#1a1b26,nobold,nounderscore,noitalics]#[fg=#1a1b26,bg=#7aa2f7,bold] #h "

# ------------------------------------------------------------------------------
# TPM (Tmux Plugin Manager)
# ------------------------------------------------------------------------------

# Bootstrap TPM (auto-installs on first run)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank' # Provides system clipboard integration

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
